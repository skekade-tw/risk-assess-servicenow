<head>

  <sdk:now-ux-globals></sdk:now-ux-globals>

  -->
  <script>
    window._env_ = {
      VITE_API_URL: "https://api.tw-dev.trustwise.ai",
      VITE_OIDC_AUTHORITY: "https://authkey.tw-dev.trustwise.ai/realms/trustwise",
      VITE_OIDC_CLIENT_ID: "frontend",
      VITE_OIDC_SCOPE: "openid profile email",
      VITE_POPUP_REDIRECT_URI: "https://dev350360.service-now.com/x_2058331_risk_popup_callback.do"
    };
  </script>

  <script src="./popup-main.tsx" type="module"></script>
</head>
<body>
  <div style="display:flex;min-height:100vh;align-items:center;justify-content:center;font-family:sans-serif;color:#6b7280;">

</html>
